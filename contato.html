<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="estilos/estilo.css">
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="javascript/script.js"></script>

    <title>Betta.com</title>
</head>
<body>
    <header>
        <nav id="navbar">
            <div class="logo_box">
                <img src="imagens/peixeBeta.png" alt="Peixe beta desenhado em cor preta" id="nav_logo">
                <h1>BETTA.COM</h1>
            </div>

            <ul id="nav_list">
                <li class="nav_item">
                    <a href="inicio.html">HOME</a>
                </li>
                <li class="nav_item">
                    <a href="sobre.html">SOBRE</a>
                </li>
                <li class="nav_item">
                    <a href="cuidados.html">CUIDADOS</a>
                </li>
                <li class="nav_item">
                    <a href="produtos.html">PRODUTOS</a>
                </li>
            </ul>

            <a href="contato.html" class="botao_padrao">
                CONTATO
            </a>

            <button id="botao_mobile">
                <i class="fa-solid fa-bars"></i>
            </button>

        </nav>

        <div id="mobile_menu">
            <ul id="mobile_nav_list">
                <li class="nav_item">
                    <a href="inicio.html">HOME</a>
                </li>
                <li class="nav_item">
                    <a href="sobre.html">SOBRE</a>
                </li>
                <li class="nav_item">
                    <a href="cuidados.html">CUIDADOS</a>
                </li>
                <li class="nav_item">
                    <a href="depoimentos.html">DEPOIMENTOS</a>
                </li>
                <li class="nav_item">
                    <a href="produtos.html">PRODUTOS</a>
                </li>
            </ul>

            <a href="contato.html" class="botao_padrao">
                CONTATO
            </a>
        </div>
    </header>
    <main id="content">
        <section id="home">
            <div id="home_base">
                <h1 class="title">Entre em <span>contato</span></h1>

                <div class="rede_social_botao">
                    <a href="https://web.whatsapp.com/">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>

                     <a href="https://www.instagram.com/">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                </div>
            </div>

            <div id="banner">
                <img src="imagens/betta.png" alt="Imagem de um peixe betta azul e preto">
            </div>
        </section>

        <section class="formulario">
            <div class="interface">
                <h2 class="title">Fale <span>conosco</span></h2>

                <form action="mailto:betta@gmail.com" method="GET" enctype="text/plain">
                    <input type="text" name="" placeholder="Seu nome" required>
                    <input type="email" name="" placeholder="Seu e-mail" required>
                    <input type="text" name="" placeholder="Sua mensagem">
                    <div class="botao_formulario"><input type="submit" value="ENVIAR"></div>
                </form>
            </div>
        </section>
    </main>

    <footer>

        <img src="imagens/wave.svg">

        <div id="footer_itens">
            <span id="copyright">
                &copy 2026 Betta
            </span>

            <div class="social-media-buttons">
                <a href="https://web.whatsapp.com/">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>

                <a href="https://www.instagram.com/">
                    <i class="fa-brands fa-instagram"></i>
                </a>

            </div>
        </div>
    </footer>
</body>
</html>
